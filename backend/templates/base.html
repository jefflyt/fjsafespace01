<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title | default("FJ SafeSpace Report") }}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="report-header">
        <h1>{{ title | default("FJ SafeSpace Indoor Air Quality Report") }}</h1>
        <p class="subtitle">Generated on {{ generated_date | default("—") }}</p>
    </header>

    <main>
        {% block content %}
        <section class="hello-section">
            <p>{{ message | default("PDF generation pipeline is operational.") }}</p>
        </section>
        {% endblock %}
    </main>

    <footer class="report-footer">
        <p>FJ SafeSpace Wellness Platform — Confidential</p>
    </footer>
</body>
</html>
